{% extends 'base.html' %}
{% block title %}Alumni's Call{% endblock %}

{% block content %}
{% load static %}
<div class="container-fluid" style="width: 55%">

    {% if message %}
        <div class="alert alert-success">
          <p align="center"><strong> {{ message }} </strong></p>
        </div>
    {% endif %}
    {% if registered %}
        <div class="alert alert-success">
          <p align="center"><strong>Thank you for registering</strong></p>
        </div><br>
    {% endif %}

</div>

            <div id="carouselExampleIndicators" class="carousel slide" data-ride="carousel" style="float: left; margin-left: 15%">
          <ol class="carousel-indicators">
            <li data-target="#carouselExampleIndicators" data-slide-to="0" class="active"></li>
            <li data-target="#carouselExampleIndicators" data-slide-to="1"></li>
            <li data-target="#carouselExampleIndicators" data-slide-to="2"></li>
              <li data-target="#carouselExampleIndicators" data-slide-to="3"></li>
          </ol>
          <div class="carousel-inner">
            <div class="carousel-item active">
              <img class="d-block w-100" src="{% static 'homepage/2.jpg' %}" alt="First slide" width="1200pixels" height="675pixels">
            </div>
            <div class="carousel-item">
              <img class="d-block w-100" src="{% static 'homepage/2.jpg' %}" alt="Second slide" width="1200pixels" height="675pixels">
            </div>
            <div class="carousel-item">
              <img class="d-block w-100" src="{% static 'homepage/3.jpg' %}" alt="Third slide" width="1200pixels" height="675pixels">
            </div>
              <div class="carousel-item">
              <img class="d-block w-100" src="{% static 'homepage/4.jpg' %}" alt="Third slide" width="1200pixels" height="675pixels">
            </div>
          </div>
          <a class="carousel-control-prev" href="#carouselExampleIndicators" role="button" data-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="sr-only">Previous</span>
          </a>
          <a class="carousel-control-next" href="#carouselExampleIndicators" role="button" data-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="sr-only">Next</span>
          </a>
        </div>
{% endblock %}
